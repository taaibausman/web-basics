<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Layout - CSS Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Our Pricing Plans</h1>
</header>

<main class="pricing">

    <div class="card">
        <h2>Basic</h2>
        <h3>$9/month</h3>
        <p>✔ 5 Projects</p>
        <p>✔ Email Support</p>
        <button>Choose Plan</button>
    </div>

    <div class="card">
        <h2>Standard</h2>
        <h3>$19/month</h3>
        <p>✔ 20 Projects</p>
        <p>✔ Priority Support</p>
        <button>Choose Plan</button>
    </div>

    <div class="card">
        <h2>Premium</h2>
        <h3>$39/month</h3>
        <p>✔ Unlimited Projects</p>
        <p>✔ 24/7 Support</p>
        <button>Choose Plan</button>
    </div>

</main>

<footer>
    <p>© 2026 Pricing Page</p>
</footer>

</body>
</html>
